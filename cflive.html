<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conbi Fan - Live</title>

<style>
:root {
  --bg: #0f1220;
  --card: #1b1f3a;
  --accent: #6366f1;
  --text: #eaeaf0;
}

html, body {
  margin: 0;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
  overflow: hidden;
}

.header {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  font-weight: 600;
}

.layout {
  display: grid;
  grid-template-columns: 3fr 1fr;
  height: calc(100vh - 56px);
  gap: 10px;
  padding: 10px;
}

.video {
  background: black;
  border-radius: 14px;
  overflow: hidden;
}

.chat {
  background: var(--card);
  border-radius: 14px;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="header">
Conbi Fan - Live
</div>

<div class="layout">

  <div class="video">
    <iframe src="https://liveconbifan.shares.zrok.io/embed/video"></iframe>
  </div>

  <div class="chat">
    <iframe src="https://liveconbifan.shares.zrok.io/embed/chat/readwrite"></iframe>
  </div>

</div>

</body>
</html>
