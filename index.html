<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="favicon.png">
<title>Conbi Fan Live</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: url("https://www.liveconbifan.f5.si/live-offline.png") center/cover no-repeat fixed;
  font-family: sans-serif;
}

/* ヘッダー */
.header {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  color: white;
  background: rgba(0,0,0,0.5);
  font-weight: bold;
}

/* レイアウト */
.layout {
  display: grid;
  grid-template-columns: 3fr 1fr;
  height: calc(100vh - 56px);
  gap: 10px;
  padding: 10px;
  box-sizing: border-box;
}

/* パネル */
.panel {
  background: rgba(0,0,0,0.5);
  border-radius: 12px;
  overflow: hidden;
}

/* iframe */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="header">
Conbi Fan - Live
</div>

<div class="layout">

  <div class="panel">
    <iframe src="https://liveconbifan.shares.zrok.io/embed/video"></iframe>
  </div>

  <div class="panel">
    <iframe src="https://liveconbifan.shares.zrok.io/embed/chat/readwrite"></iframe>
  </div>

</div>

</body>
</html>
