<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="favicon.png">

<title>Conbi Fan Live</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: url("https://www.liveconbifan.f5.si/live-offline.png") center/cover no-repeat fixed;
  font-family: sans-serif;
  overflow: hidden;
}

/* ヘッダー */
.header {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  color: white;
  background: rgba(0,0,0,0.5);
  font-weight: bold;
}

/* 通知ボタン */
#notifyBtn {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background: #ff3b3b;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* 状態表示 */
#notifyStatus {
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 6px;
  background: rgba(0,0,0,0.4);
}

/* レイアウト */
.layout {
  display: grid;
  grid-template-columns: 3fr 1fr;
  height: calc(100vh - 56px);
  gap: 10px;
  padding: 10px;
  box-sizing: border-box;
}

/* パネル */
.panel {
  background: rgba(0,0,0,0.5);
  border-radius: 12px;
  overflow: hidden;
}

/* iframe */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  Conbi Fan - Live

  <button id="notifyBtn" onclick="enableNotifications()">
    🔔 通知
    <span id="notifyStatus">未設定</span>
  </button>
</div>

<div class="layout">
  <div class="panel">
    <iframe src="https://liveconbifan.shares.zrok.io/embed/video"></iframe>
  </div>

  <div class="panel">
    <iframe src="https://liveconbifan.shares.zrok.io/embed/chat/readwrite"></iframe>
  </div>
</div>

<script>
let wasOnline = false;

/* =========================
   通知UI更新（消えない）
========================= */
function updateNotifyUI() {
  const status = document.getElementById("notifyStatus");
  const btn = document.getElementById("notifyBtn");

  if (!status || !btn) return;

  const perm = Notification.permission;

  if (perm === "granted") {
    status.textContent = "ON";
    status.style.color = "lime";
  } else if (perm === "denied") {
    status.textContent = "OFF";
    status.style.color = "red";
  } else {
    status.textContent = "未設定";
    status.style.color = "orange";
  }

  // ボタンは絶対に消さない
  btn.style.display = "flex";
}

/* =========================
   通知許可
========================= */
async function enableNotifications() {
  const p = await Notification.requestPermission();
  console.log("permission:", p);
  updateNotifyUI();
}

/* =========================
   音
========================= */
function playStartSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const notes = [523.25, 659.25, 783.99];

  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.2);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + i * 0.15);
    osc.stop(ctx.currentTime + 1.5);
  });
}

/* =========================
   通知
========================= */
function showNotification() {
  if (Notification.permission !== "granted") return;

  new Notification("🔴 LIVE START!", {
    body: "Conbi Fanの配信が始まったよ！",
    icon: "https://www.liveconbifan.f5.si/favicon.png"
  });
}

/* =========================
   配信チェック
========================= */
async function checkLive() {
  try {
    const res = await fetch("https://liveconbifan.shares.zrok.io/api/status", {
      cache: "no-store"
    });

    const data = await res.json();

    const isOnline = data.online === true || data.online === "true";

    console.log("LIVE:", isOnline, "prev:", wasOnline);

    if (isOnline && !wasOnline) {
      showNotification();
      playStartSound();
    }

    wasOnline = isOnline;

  } catch (e) {
    console.log("status error:", e);
  }
}

/* =========================
   起動（安全版）
========================= */
window.addEventListener("DOMContentLoaded", () => {
  updateNotifyUI();
  setInterval(checkLive, 3000);
  checkLive();
});
</script>

</body>
</html>
